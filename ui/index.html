<!DOCTYPE html>
<html class="light" lang="ru">
<head>
<script>
    (function() {
        const stored = localStorage.getItem('dark_theme');
        if (stored === 'true') {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
        } else if (stored === 'false') {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
        }
    })();
</script>

<body class="bg-background font-body text-on-background selection:bg-primary/20 selection:text-primary min-h-screen flex flex-col">
<!-- Header -->

    <div class="flex items-center gap-2">
        <span class="text-primary font-headline font-800 text-2xl tracking-tighter">VOID</span>
    </div>
    <div class="flex items-center gap-2">

            <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
        </button>
        <a href="/settings" class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:scale-95 duration-300 text-stone-600 dark:text-stone-400">
            <span class="material-symbols-outlined">settings</span>
        </a>
        <button id="close-app" class="p-2 rounded-full hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors active:scale-95 duration-300 text-stone-600 dark:text-stone-400 hover:text-red-600 dark:hover:text-red-400" title="Закрыть приложение">

<!-- Toast Notifications -->
<div id="toast-container" class="fixed bottom-6 left-6 z-50 flex flex-col gap-3 max-w-sm"></div>

<!-- Playlist Dialog -->
<div id="playlist-dialog" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-6">

        <!-- Dialog Header -->
        <div class="flex items-center justify-between p-6 border-b border-outline-variant">

<!-- Main Content -->
<main class="flex-1 flex items-center justify-center px-6 py-12">

                <span class="material-symbols-outlined text-primary">link</span>
                <input id="url-input" class="w-full bg-transparent border-none focus:ring-0 text-xl font-body text-on-surface placeholder:text-on-secondary-container" placeholder="Вставьте URL видео или плейлиста..." type="text"/>
            </div>
            <button id="download-btn" class="signature-gradient text-on-primary px-10 py-4 rounded-full font-headline font-bold text-lg hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-lg shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed">
                Скачать
            </button>

        <!-- Download Queue Section -->
        <section class="flex flex-col gap-6">
            <div class="flex items-center justify-between px-2">
                <h2 class="font-headline font-bold text-xl text-on-surface">Активные загрузки</h2>
                <span id="active-count" class="bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-label font-semibold">0 items</span>
            </div>
            <div id="downloads-list" class="space-y-3">
                <!-- Загрузки будут добавлены сюда динамически -->
                <div id="empty-state" class="text-center py-12 text-on-secondary-container">
                    <span class="material-symbols-outlined text-6xl mb-4 opacity-50">download</span>
                    <p class="text-lg">Нет активных загрузок</p>
                    <p class="text-sm mt-2">Вставьте URL выше чтобы начать загрузку</p>
                </div>
            </div>
        </section>

<script>
const API_URL = window.location.origin;
const downloadsList = document.getElementById('downloads-list');
const urlInput = document.getElementById('url-input');
const downloadBtn = document.getElementById('download-btn');
const activeCount = document.getElementById('active-count');
const emptyState = document.getElementById('empty-state');

// WebSocket подключение
let ws = null;
function connectWebSocket() {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'progress_update') {
            renderDownloads(data.tasks);
            activeCount.textContent = `${data.active_count} items`;
        } else if (data.type === 'notification') {
            showToast(data.message, data.title);
        }
    };
    
    ws.onclose = () => {
        setTimeout(connectWebSocket, 2000);
    };
}

// Загрузка видео
let currentPlaylistUrl = '';
let playlistEntries = [];
let selectedIndices = new Set();

downloadBtn.addEventListener('click', async () => {
    const url = urlInput.value.trim();
    if (!url) return;

    downloadBtn.disabled = true;
    downloadBtn.textContent = 'Проверка...';

    try {
        // Проверяем, является ли URL плейлистом
        const response = await fetch(`${API_URL}/api/playlist/info`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (data.entries && data.entries.length > 0) {
            // Это плейлист — открываем диалог
            currentPlaylistUrl = url;
            playlistEntries = data.entries;
            selectedIndices = new Set();
            showPlaylistDialog(data);
        } else if (data.error) {
            // Ошибка или не плейлист — скачиваем как обычное видео
            await startDownload(url);
        } else {
            // Не плейлист — скачиваем как обычное видео
            await startDownload(url);
        }
    } catch (err) {
        console.error('Ошибка при проверке URL:', err);
        // На всякий случай пытаемся скачать как видео
        await startDownload(url);
    } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = 'Скачать';
    }
});

async function startDownload(url) {
    try {
        const response = await fetch(`${API_URL}/api/download`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        });

        if (response.ok) {
            urlInput.value = '';
        }
    } catch (err) {
        console.error('Ошибка при загрузке:', err);
    }
}

// Playlist Dialog
function showPlaylistDialog(data) {
    const dialog = document.getElementById('playlist-dialog');
    const title = document.getElementById('playlist-title');
    const count = document.getElementById('playlist-count');
    const videosContainer = document.getElementById('playlist-videos');
    const downloadBtn = document.getElementById('playlist-download-btn');

    title.textContent = data.title;
    count.textContent = `${data.entries.length} видео`;

    renderPlaylistVideos(data.entries);
    updateDownloadButton();

    dialog.classList.remove('hidden');
    dialog.classList.add('flex');
}

function renderPlaylistVideos(entries) {
    const container = document.getElementById('playlist-videos');

    container.innerHTML = entries.map(entry => `
        <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-surface-container-low cursor-pointer transition-colors group">
            <input type="checkbox" class="playlist-checkbox w-5 h-5 rounded border-outline text-primary focus:ring-primary focus:ring-2 bg-surface-container-high shrink-0" data-index="${entry.index}" onchange="toggleVideoSelection(${entry.index}, this.checked)">
            <img src="${entry.thumbnail}" alt="" class="w-16 h-12 object-cover rounded-lg bg-surface-container-high shrink-0" loading="lazy" onerror="this.style.display='none'">
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-on-surface truncate">${escapeHtml(entry.title)}</p>
                <p class="text-xs text-on-surface-variant">Видео #${entry.index}</p>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity text-[20px] shrink-0">play_circle</span>
        </label>
    `).join('');
}

window.toggleVideoSelection = function(index, checked) {
    if (checked) {
        selectedIndices.add(index);
    } else {
        selectedIndices.delete(index);
    }
    updateDownloadButton();
}

function updateDownloadButton() {
    const btn = document.getElementById('playlist-download-btn');
    btn.textContent = `Скачать (${selectedIndices.size})`;
    btn.disabled = selectedIndices.size === 0;
}

// Закрытие диалога
document.getElementById('playlist-close').addEventListener('click', closePlaylistDialog);
document.getElementById('playlist-dialog').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closePlaylistDialog();
});

function closePlaylistDialog() {
    const dialog = document.getElementById('playlist-dialog');
    dialog.classList.add('hidden');
    dialog.classList.remove('flex');
    currentPlaylistUrl = '';
    playlistEntries = [];
    selectedIndices = new Set();
}

// Выбрать все
document.getElementById('select-all-btn').addEventListener('click', () => {
    playlistEntries.forEach(entry => selectedIndices.add(entry.index));
    document.querySelectorAll('.playlist-checkbox').forEach(cb => cb.checked = true);
    updateDownloadButton();
});

// Снять все
document.getElementById('deselect-all-btn').addEventListener('click', () => {
    selectedIndices.clear();
    document.querySelectorAll('.playlist-checkbox').forEach(cb => cb.checked = false);
    updateDownloadButton();
});

// Скачать выбранные
document.getElementById('playlist-download-btn').addEventListener('click', async () => {
    if (selectedIndices.size === 0) return;

    const btn = document.getElementById('playlist-download-btn');
    btn.disabled = true;
    btn.textContent = 'Добавление...';

    try {
        const response = await fetch(`${API_URL}/api/playlist/download`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: currentPlaylistUrl, selected_indices: Array.from(selectedIndices) })
        });

        if (response.ok) {
            urlInput.value = '';
            closePlaylistDialog();
        }
    } catch (err) {
        console.error('Ошибка при загрузке плейлиста:', err);
    } finally {
        btn.disabled = false;
        btn.textContent = `Скачать (${selectedIndices.size})`;
    }
});

// Ренер списка загрузок
function renderDownloads(tasks) {
    if (tasks.length === 0) {
        emptyState.style.display = 'block';
        downloadsList.innerHTML = '';
        downloadsList.appendChild(emptyState);
        return;
    }
    
    emptyState.style.display = 'none';
    downloadsList.innerHTML = tasks.map(task => {
        const statusText = getStatusText(task.status);
        const statusColor = getStatusColor(task.status);
        const progressBarColor = getProgressBarColor(task.status);
        const showActions = showActionButtons(task.status);
        
        return `
        <div class="bg-surface-container-low p-5 rounded-2xl border border-surface-container flex flex-col gap-3 group hover:border-outline-variant transition-colors ${task.status === 'completed' ? 'opacity-60' : ''}">
            <div class="flex justify-between items-start">
                <div class="flex-1 min-w-0">
                    <h3 class="font-semibold text-on-surface truncate pr-4">${escapeHtml(task.title || 'Загрузка...')}</h3>
                    <p class="text-sm text-secondary mt-1">${formatBytes(task.downloaded_bytes)} / ${formatBytes(task.total_bytes)} • <span class="${statusColor} font-medium italic">${statusText}</span></p>
                    ${task.speed ? `<p class="text-xs text-secondary mt-1">${task.speed} • ETA: ${task.eta}</p>` : ''}
                </div>
                <div class="flex gap-2">
                    ${showActions ? `
                        ${task.status === 'paused' ? `
                        <button onclick="resumeTask('${task.id}')" class="text-primary hover:bg-primary/10 p-1.5 rounded-full transition-colors" title="Продолжить">
                            <span class="material-symbols-outlined text-[20px]">play_arrow</span>
                        </button>
                        ` : ''}
                        ${task.status === 'downloading' ? `
                        <button onclick="pauseTask('${task.id}')" class="text-on-secondary-container hover:text-primary hover:bg-primary/10 p-1.5 rounded-full transition-colors" title="Приостановить">
                            <span class="material-symbols-outlined text-[20px]">pause</span>
                        </button>
                        ` : ''}
                        <button onclick="cancelTask('${task.id}')" class="text-on-secondary-container hover:text-error hover:bg-error/10 p-1.5 rounded-full transition-colors" title="Отменить">
                            <span class="material-symbols-outlined text-[20px]">close</span>
                        </button>
                    ` : `
                        <button onclick="removeTask('${task.id}')" class="text-on-secondary-container hover:text-error hover:bg-error/10 p-1.5 rounded-full transition-colors" title="Удалить">
                            <span class="material-symbols-outlined text-[20px]">delete</span>
                        </button>
                    `}
                </div>
            </div>
            <div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
                <div class="${progressBarColor} h-full rounded-full transition-all duration-500" style="width: ${task.progress}%"></div>
            </div>
            ${task.error_message ? `<p class="text-xs text-error mt-1">${escapeHtml(task.error_message)}</p>` : ''}
        </div>
        `;
    }).join('');
}

function getStatusText(status) {
    const map = {
        'downloading': 'Загрузка...',
        'paused': 'Приостановлено',
        'completed': 'Завершено',
        'error': 'Ошибка',
        'processing': 'Обработка...'
    };
    return map[status] || status;
}

function getStatusColor(status) {
    const map = {
        'downloading': 'text-primary',
        'paused': 'text-on-secondary-container',
        'completed': 'text-tertiary',
        'error': 'text-error',
        'processing': 'text-tertiary'
    };
    return map[status] || 'text-secondary';
}

function getProgressBarColor(status) {
    const map = {
        'downloading': 'bg-primary',
        'paused': 'bg-secondary',
        'completed': 'bg-tertiary',
        'error': 'bg-error',
        'processing': 'bg-tertiary'
    };
    return map[status] || 'bg-secondary';
}

function showActionButtons(status) {
    return ['downloading', 'paused'].includes(status);
}

function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Toast уведомления
function showToast(message, title = '') {
    const container = document.getElementById('toast-container');

    const toast = document.createElement('div');
    toast.className = 'bg-surface-container-low border border-outline-variant rounded-xl p-4 shadow-lg flex flex-col gap-2 animate-slide-in';

    const titleHtml = title ? `<p class="text-sm font-semibold text-on-surface truncate">${escapeHtml(title)}</p>` : '';

    toast.innerHTML = `
        <div class="flex items-start gap-3">
            <span class="material-symbols-outlined text-amber-500 text-[22px] shrink-0 mt-0.5">warning</span>
            <div class="flex-1 min-w-0">
                ${titleHtml}
                <p class="text-sm text-on-surface-variant">${escapeHtml(message)}</p>
            </div>
            <button onclick="this.parentElement.parentElement.remove()" class="text-on-surface-variant hover:text-on-surface shrink-0">
                <span class="material-symbols-outlined text-[18px]">close</span>
            </button>
        </div>
    `;

    container.appendChild(toast);

    // Автоматическое удаление через 5 секунд
    setTimeout(() => {
        toast.classList.add('animate-slide-out');
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// Инициализация
connectWebSocket();

// Переключение темы
let isDarkTheme = false;

document.getElementById('theme-toggle')?.addEventListener('click', async () => {
    isDarkTheme = !isDarkTheme;
    
    if (isDarkTheme) {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
        document.getElementById('theme-icon').textContent = 'light_mode';
    } else {
        document.documentElement.classList.add('light');
        document.documentElement.classList.remove('dark');
        document.getElementById('theme-icon').textContent = 'dark_mode';
    }
    
    // Сохраняем настройку на сервере
    try {
        const response = await fetch(`${API_URL}/api/settings`);
        const settings = await response.json();
        settings.dark_theme = isDarkTheme;
        
        await fetch(`${API_URL}/api/settings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ settings })
        });
    } catch (err) {
        console.error('Ошибка сохранения темы:', err);
    }
});

// Загрузка настроек и применение темы
async function loadThemeSettings() {
    try {
        const response = await fetch(`${API_URL}/api/settings`);
        const settings = await response.json();
        
        isDarkTheme = settings.dark_theme;
        
        if (isDarkTheme) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
            document.getElementById('theme-icon').textContent = 'light_mode';
        } else {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
            document.getElementById('theme-icon').textContent = 'dark_mode';
        }
    } catch (err) {
        console.error('Ошибка загрузки настроек темы:', err);
    }
}

// Загрузка начального состояния
async function loadInitialData() {
    try {
        const [downloadsRes, statusRes] = await Promise.all([
            fetch(`${API_URL}/api/downloads`),
            fetch(`${API_URL}/api/status`)
        ]);

        const downloads = await downloadsRes.json();
        const status = await statusRes.json();

        renderDownloads(downloads);
        activeCount.textContent = `${status.active_downloads} items`;
    } catch (err) {
        console.error('Ошибка загрузки данных:', err);
    }
}

loadThemeSettings();
loadInitialData();

// Закрытие приложения
document.getElementById('close-app')?.addEventListener('click', () => {
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.close();

});

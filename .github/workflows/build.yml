name: Build and Test StreamVault

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Разрешаем создание тегов и релизов
    env:
      PYTHONUTF8: 1

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Нужно для корректного определения предыдущих тегов

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pytest pytest-asyncio Pillow
        pip install -r requirements.txt

    - name: Run Tests
      env:
        PYTHONPATH: .
      run: python -m pytest tests/

    - name: Build Executable
      run: python build.py

    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: minor
        tag_prefix: "" # Используем формат 1.0, 1.1 без префикса 'v'

    - name: Create a GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        name: Release ${{ steps.tag_version.outputs.new_tag }}
        body: ${{ steps.tag_version.outputs.changelog }}
        files: dist/StreamVault.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
